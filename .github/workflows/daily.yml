name: Daily DPD PM Monitor

permissions:
  contents: write   # ✅ OBLIGATOIRE pour git push

on:
  schedule:
    - cron: "0 11 * * *"   # Tous les jours à 11:00 UTC (~6h Toronto)
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PM monitor
        run: |
          python src/drug_pm_monitor.py

      - name: Commit updated datasets
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Data/

          git diff --cached --quiet && echo "✅ No changes to commit" || (
            git commit -m "Update PM datasets (automated)"
            git push
          )
